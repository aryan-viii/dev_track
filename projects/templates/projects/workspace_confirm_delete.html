{% extends "base.html" %}

{% block title %}
Delete Workspace
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card border-danger shadow">

            <div class="card-header bg-danger text-white">

                <h3 class="mb-0">
                    <i class="bi bi-trash"></i>
                    Delete Workspace
                </h3>

            </div>

            <div class="card-body">

                <p class="lead">

                    Are you sure you want to delete

                    <strong>

                        "{{ workspace.name }}"

                    </strong>?

                </p>

                <p class="text-danger">

                    This action cannot be undone.

                </p>

                <form method="POST">

                    {% csrf_token %}

                    <button
                        class="btn btn-danger"
                    >

                        <i class="bi bi-trash"></i>

                        Delete Workspace

                    </button>

                    <a
                        href="{% url 'workspace_detail' workspace.pk %}"
                        class="btn btn-secondary"
                    >

                        Cancel

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
