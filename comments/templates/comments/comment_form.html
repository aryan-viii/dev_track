{% extends "base.html" %}

{% block title %}
Edit Comment
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6">

        <div class="card shadow">

            <div class="card-header">
                <h3 class="mb-0">
                    <i class="bi bi-chat-left-text"></i>
                    Edit Comment
                </h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    {{ form.body }}

                    <div class="text-danger">
                        {{ form.body.errors }}
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary mt-3"
                    >
                        <i class="bi bi-check-circle"></i>
                        Update Comment
                    </button>

                    <a
                        href="{% url 'task_detail' workspace.pk project.pk task.pk %}"
                        class="btn btn-secondary mt-3"
                    >
                        Cancel
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
