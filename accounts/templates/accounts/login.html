{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-5">

        <div class="card shadow">

            <div class="card-header bg-dark text-white">

                <h3 class="mb-0">

                    <i class="bi bi-box-arrow-in-right"></i>

                    Login

                </h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    {% for field in form %}

                        <div class="mb-3">

                            <label class="form-label">

                                {{ field.label }}

                            </label>

                            {{ field }}

                            {% for error in field.errors %}

                                <div class="text-danger">

                                    {{ error }}

                                </div>

                            {% endfor %}

                        </div>

                    {% endfor %}

                    <button
                        class="btn btn-dark w-100"
                    >

                        <i class="bi bi-box-arrow-in-right"></i>

                        Login

                    </button>

                </form>

            </div>

            <div class="card-footer text-center">

                Don't have an account?

                <a href="{% url 'register' %}">

                    Register

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
