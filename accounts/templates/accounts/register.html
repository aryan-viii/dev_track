{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3 class="mb-0">
                    <i class="bi bi-person-plus-fill"></i>
                    Create Account
                </h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    {% for field in form %}

                        <div class="mb-3">

                            <label class="form-label">

                                {{ field.label }}

                            </label>

                            {{ field }}

                            {% if field.help_text %}

                                <div class="form-text">

                                    {{ field.help_text }}

                                </div>

                            {% endif %}

                            {% for error in field.errors %}

                                <div class="text-danger">

                                    {{ error }}

                                </div>

                            {% endfor %}

                        </div>

                    {% endfor %}

                    <button class="btn btn-primary w-100">

                        <i class="bi bi-person-check-fill"></i>

                        Register

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
